name: TreeWrap Spec Validation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docs/treewrap-spec.md'
      - 'docs/treewrap-validation.py'
      - 'docs/treewrap-test-vectors.json'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'docs/treewrap-spec.md'
      - 'docs/treewrap-validation.py'
      - 'docs/treewrap-test-vectors.json'

permissions:
  contents: read

jobs:
  validate:
    name: Validate TreeWrap Vectors
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Run validation
      run: python3 docs/treewrap-validation.py --validate
